<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platinumlist — Organiser Research Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@font-face { font-family: 'MD Nichrome'; src: url('data:font/otf;base64,') format('opentype'); font-weight: bold; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --electro: #221327; --storm: #0A181C; --black: #000000;
  --monday: #79E2FF; --day: #C7F88A; --suede: #00A5D3;
  --grey: #8A9BA8; --white: #F0F6F8; --t2: #7A9BAA; --t3: #3D5A68;
  --bg: #050508; --s1: #0B1015; --s2: #111920; --bd: #1A2830;
  --card: #0C2A35; --card2: #0F1E25;
}
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; }

/* AUTH GATE */
#authGate { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
.auth-box { background: var(--s1); border: 1px solid var(--bd); border-radius: 16px; padding: 48px; text-align: center; max-width: 400px; width: 90%; }
.auth-logo { width: 48px; height: 48px; margin-bottom: 16px; }
.auth-title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 22px; color: var(--monday); margin-bottom: 8px; letter-spacing: -0.5px; }
.auth-sub { color: var(--t2); font-size: 14px; margin-bottom: 32px; }
.auth-input { width: 100%; padding: 14px 18px; background: var(--s2); border: 1px solid var(--bd); border-radius: 10px; color: var(--white); font-size: 15px; font-family: 'Inter', sans-serif; outline: none; transition: border-color .2s; }
.auth-input:focus { border-color: var(--monday); }
.auth-btn { width: 100%; padding: 14px; background: var(--monday); color: var(--black); font-weight: 700; font-size: 15px; border: none; border-radius: 10px; cursor: pointer; margin-top: 16px; transition: opacity .2s; font-family: 'Inter', sans-serif; }
.auth-btn:hover { opacity: .85; }
.auth-err { color: #FF6B6B; font-size: 13px; margin-top: 12px; display: none; }

/* DASHBOARD */
#dashboard { display: none; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; background: var(--s1); border-bottom: 1px solid var(--bd); position: sticky; top: 0; z-index: 100; }
.topbar-left { display: flex; align-items: center; gap: 16px; }
.topbar-title { font-weight: 700; font-size: 18px; color: var(--monday); letter-spacing: -0.3px; }
.topbar-badge { background: var(--card); color: var(--day); font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.logout-btn { background: transparent; border: 1px solid var(--bd); color: var(--t2); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: 'Inter', sans-serif; transition: all .2s; }
.logout-btn:hover { border-color: var(--monday); color: var(--monday); }

/* STATS ROW */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; padding: 24px 32px; }
.stat-card { background: var(--s1); border: 1px solid var(--bd); border-radius: 12px; padding: 20px; border-left: 3px solid var(--monday); }
.stat-card:nth-child(even) { border-left-color: var(--day); }
.stat-num { font-weight: 700; font-size: 28px; color: var(--white); margin-bottom: 4px; }
.stat-card:nth-child(even) .stat-num { color: var(--day); }
.stat-card:nth-child(odd) .stat-num { color: var(--monday); }
.stat-label { color: var(--t2); font-size: 13px; }

/* FILTERS */
.filters-bar { padding: 16px 32px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; background: var(--s1); border-bottom: 1px solid var(--bd); }
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-label { font-size: 11px; color: var(--t3); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.filter-select, .filter-input { padding: 10px 14px; background: var(--s2); border: 1px solid var(--bd); border-radius: 8px; color: var(--white); font-size: 13px; font-family: 'Inter', sans-serif; outline: none; min-width: 160px; }
.filter-select:focus, .filter-input:focus { border-color: var(--monday); }
.filter-input { min-width: 240px; }
.filter-btn { padding: 10px 20px; background: transparent; border: 1px solid var(--monday); color: var(--monday); border-radius: 8px; cursor: pointer; font-size: 13px; font-family: 'Inter', sans-serif; font-weight: 600; transition: all .2s; align-self: flex-end; }
.filter-btn:hover { background: var(--monday); color: var(--black); }
.filter-btn.active { background: var(--monday); color: var(--black); }
.filter-count { color: var(--day); font-size: 13px; font-weight: 600; align-self: flex-end; padding-bottom: 10px; }

/* TABLE */
.table-wrap { padding: 0 32px 32px; overflow-x: auto; }
table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 16px; }
thead th { background: var(--storm); color: var(--monday); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 14px 16px; text-align: left; position: sticky; top: 64px; z-index: 10; cursor: pointer; white-space: nowrap; border-bottom: 2px solid var(--monday); }
thead th:hover { color: var(--day); }
thead th.sort-asc::after { content: ' ▲'; font-size: 10px; }
thead th.sort-desc::after { content: ' ▼'; font-size: 10px; }
tbody tr { transition: background .15s; }
tbody tr:nth-child(odd) { background: var(--s1); }
tbody tr:nth-child(even) { background: var(--s2); }
tbody tr:hover { background: var(--card); }
td { padding: 12px 16px; font-size: 13px; color: var(--white); border-bottom: 1px solid var(--bd); vertical-align: top; max-width: 300px; }
td.org-name { font-weight: 600; color: var(--white); white-space: nowrap; }
td a { color: var(--monday); text-decoration: none; word-break: break-all; }
td a:hover { text-decoration: underline; color: var(--day); }
.conf-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.conf-5 { background: rgba(121, 226, 255, 0.15); color: var(--monday); }
.conf-4 { background: rgba(199, 248, 138, 0.15); color: var(--day); }
.conf-3 { background: rgba(138, 155, 168, 0.15); color: var(--grey); }
.conf-2, .conf-1, .conf-0 { background: rgba(255, 107, 107, 0.1); color: #FF6B6B; }
.country-pill { display: inline-block; background: var(--card); color: var(--monday); padding: 2px 8px; border-radius: 10px; font-size: 11px; margin: 2px; white-space: nowrap; }
.country-pill.unconfirmed { color: var(--grey); border: 1px dashed var(--t3); background: transparent; }
.notes-cell { color: var(--t2); font-size: 12px; max-width: 250px; line-height: 1.4; }
.notes-expand { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; cursor: pointer; }
.notes-expand.open { -webkit-line-clamp: unset; }
.social-icon { width: 16px; height: 16px; display: inline-block; margin-right: 4px; vertical-align: middle; opacity: 0.7; }

/* PAGINATION */
.pagination { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 24px; }
.page-btn { padding: 8px 14px; background: var(--s1); border: 1px solid var(--bd); color: var(--t2); border-radius: 8px; cursor: pointer; font-size: 13px; font-family: 'Inter', sans-serif; transition: all .2s; }
.page-btn:hover { border-color: var(--monday); color: var(--monday); }
.page-btn.active { background: var(--monday); color: var(--black); border-color: var(--monday); font-weight: 600; }
.page-btn:disabled { opacity: 0.3; cursor: default; }
.page-info { color: var(--t2); font-size: 13px; }

/* DETAIL MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--s1); border: 1px solid var(--bd); border-radius: 16px; width: 90%; max-width: 700px; max-height: 85vh; overflow-y: auto; padding: 32px; }
.modal-close { float: right; background: transparent; border: none; color: var(--t2); font-size: 24px; cursor: pointer; }
.modal-close:hover { color: var(--monday); }
.modal h2 { font-weight: 700; font-size: 20px; color: var(--monday); margin-bottom: 20px; }
.modal-field { margin-bottom: 16px; }
.modal-field-label { font-size: 11px; text-transform: uppercase; color: var(--t3); letter-spacing: 0.5px; font-weight: 600; margin-bottom: 4px; }
.modal-field-value { font-size: 14px; color: var(--white); line-height: 1.5; }
.modal-field-value a { color: var(--monday); }

/* EXPORT */
.export-btn { padding: 10px 20px; background: var(--day); color: var(--black); border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif; }
.export-btn:hover { opacity: .85; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); padding: 16px; }
  .filters-bar { padding: 12px 16px; }
  .table-wrap { padding: 0 8px 16px; }
  .topbar { padding: 12px 16px; }
  td, th { padding: 8px 10px; font-size: 12px; }
  .filter-input { min-width: 180px; }
}
</style>
</head>

    <div class="auth-title">ORGANISER RESEARCH</div>

</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">

    <div class="topbar-right">

      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row" id="statsRow"></div>

  <!-- FILTERS -->
  <div class="filters-bar">
    <div class="filter-group">
      <span class="filter-label">Search</span>
      <input class="filter-input" id="fSearch" placeholder="Search organiser, email, URL..." oninput="applyFilters()">
    </div>
    <div class="filter-group">
      <span class="filter-label">Region</span>
      <select class="filter-select" id="fRegion" onchange="applyFilters()">
        <option value="">All Regions</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Country</span>
      <select class="filter-select" id="fCountry" onchange="applyFilters()">
        <option value="">All Countries</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Website</span>
      <select class="filter-select" id="fWebsite" onchange="applyFilters()">
        <option value="">Any</option>
        <option value="yes">Has Website</option>
        <option value="no">No Website</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Instagram</span>
      <select class="filter-select" id="fIG" onchange="applyFilters()">
        <option value="">Any</option>
        <option value="yes">Has Instagram</option>
        <option value="no">No Instagram</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Facebook</span>
      <select class="filter-select" id="fFB" onchange="applyFilters()">
        <option value="">Any</option>
        <option value="yes">Has Facebook</option>
        <option value="no">No Facebook</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">LinkedIn</span>
      <select class="filter-select" id="fLI" onchange="applyFilters()">
        <option value="">Any</option>
        <option value="yes">Has LinkedIn</option>
        <option value="no">No LinkedIn</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Confidence</span>
      <select class="filter-select" id="fConf" onchange="applyFilters()">
        <option value="">Any Level</option>
        <option value="5">5 — Confirmed</option>
        <option value="4">4 — Likely</option>
        <option value="3">3 — Possible</option>
        <option value="low">≤2 — Weak/None</option>
      </select>
    </div>
    <button class="filter-btn" onclick="resetFilters()">Reset</button>
    <span class="filter-count" id="filterCount"></span>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('o')">#</th>
          <th onclick="sortBy('r')">Region</th>
          <th onclick="sortBy('o')">Organiser</th>
          <th>Contact</th>
          <th onclick="sortBy('wc')">Website</th>
          <th onclick="sortBy('igc')">Instagram</th>
          <th onclick="sortBy('fbc')">Facebook</th>
          <th onclick="sortBy('lic')">LinkedIn</th>
          <th>Extra</th>
          <th>Countries</th>
          <th>Cities</th>
          <th>Unconfirmed</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- PAGINATION -->
  <div class="pagination" id="pagination"></div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h2 id="modalTitle"></h2>
    <div id="modalBody"></div>
  </div>
</div>

function checkPw() {
  var pw = document.getElementById("authPw").value;
  if (pw === AUTH_PW) {
    sessionStorage.setItem("plOrgAuth", "1");
    document.getElementById("authGate").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    init();
  } else {
    document.getElementById("authErr").style.display = "block";
    document.getElementById("authPw").value = "";
  }
}

function logout() {
  sessionStorage.removeItem("plOrgAuth");
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("authGate").style.display = "flex";
}

function init() {
  // Populate region filter
  var regions = [...new Set(DATA.map(d => d.r))].sort();
  var sel = document.getElementById("fRegion");
  regions.forEach(r => { var o = document.createElement("option"); o.value = r; o.textContent = r; sel.appendChild(o); });

  // Populate country filter
  var csel = document.getElementById("fCountry");
  COUNTRIES.forEach(c => { var o = document.createElement("option"); o.value = c; o.textContent = c; csel.appendChild(o); });

  applyFilters();
}

function applyFilters() {
  var search = document.getElementById("fSearch").value.toLowerCase();
  var region = document.getElementById("fRegion").value;
  var country = document.getElementById("fCountry").value;
  var fW = document.getElementById("fWebsite").value;
  var fI = document.getElementById("fIG").value;
  var fF = document.getElementById("fFB").value;
  var fL = document.getElementById("fLI").value;
  var fC = document.getElementById("fConf").value;

  filtered = DATA.filter(function(d) {
    if (search && !(d.o.toLowerCase().includes(search) || d.e.toLowerCase().includes(search) || d.w.toLowerCase().includes(search) || (d.ig||'').toLowerCase().includes(search) || (d.cc||'').toLowerCase().includes(search))) return false;
    if (region && d.r !== region) return false;
    if (country && !(d.cc||'').includes(country)) return false;
    if (fW === 'yes' && !d.w) return false;
    if (fW === 'no' && d.w) return false;
    if (fI === 'yes' && !d.ig) return false;
    if (fI === 'no' && d.ig) return false;
    if (fF === 'yes' && !d.fb) return false;
    if (fF === 'no' && d.fb) return false;
    if (fL === 'yes' && !d.li) return false;
    if (fL === 'no' && d.li) return false;
    if (fC === '5' && Math.max(d.wc||0, d.igc||0, d.fbc||0, d.lic||0) < 5) return false;
    if (fC === '4' && Math.max(d.wc||0, d.igc||0, d.fbc||0, d.lic||0) < 4) return false;
    if (fC === '3' && Math.max(d.wc||0, d.igc||0, d.fbc||0, d.lic||0) < 3) return false;
    if (fC === 'low' && Math.max(d.wc||0, d.igc||0, d.fbc||0, d.lic||0) > 2) return false;
    return true;
  });

  // Sort
  filtered.sort(function(a, b) {
    var va = a[sortCol] || '', vb = b[sortCol] || '';
    if (typeof va === 'number' && typeof vb === 'number') return (va - vb) * sortDir;
    return String(va).localeCompare(String(vb)) * sortDir;
  });

  currentPage = 1;
  renderStats();
  renderTable();
  renderPagination();

  document.getElementById("filterCount").textContent = filtered.length + " of " + DATA.length + " organisers";
  document.getElementById("totalBadge").textContent = filtered.length + " organisers";
}

function renderStats() {
  var hasW = filtered.filter(d => d.w).length;
  var hasIG = filtered.filter(d => d.ig).length;
  var hasFB = filtered.filter(d => d.fb).length;
  var hasLI = filtered.filter(d => d.li).length;
  var withCountries = filtered.filter(d => d.cc).length;

  document.getElementById("statsRow").innerHTML =
    '<div class="stat-card"><div class="stat-num">' + filtered.length + '</div><div class="stat-label">Total Organisers</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + hasW + '</div><div class="stat-label">With Website</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + hasIG + '</div><div class="stat-label">With Instagram</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + hasFB + '</div><div class="stat-label">With Facebook</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + hasLI + '</div><div class="stat-label">With LinkedIn</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + withCountries + '</div><div class="stat-label">With Countries Data</div></div>';
}

function confBadge(val) {
  var v = Number(val) || 0;
  var cls = v >= 5 ? 'conf-5' : v >= 4 ? 'conf-4' : v >= 3 ? 'conf-3' : 'conf-0';
  return '<span class="conf-badge ' + cls + '">' + v + '</span>';
}

function linkCell(url, conf, notes) {
  if (!url) return '<span style="color:var(--t3)">—</span>';
  var short = url.replace(/https?:\/\/(?:www\.)?/, '').replace(/\/$/, '');
  if (short.length > 35) short = short.substring(0, 35) + '…';
  return '<a href="' + url + '" target="_blank" rel="noopener">' + short + '</a> ' + confBadge(conf);
}

function countryPills(str, cls) {
  if (!str) return '';
  return str.split(',').map(function(c) {
    c = c.trim().replace(/[\[\]"']/g, '');
    if (!c || c.length < 2) return '';
    return '<span class="country-pill ' + (cls||'') + '">' + c + '</span>';
  }).join('');
}

function renderTable() {
  var start = (currentPage - 1) * PER_PAGE;
  var end = Math.min(start + PER_PAGE, filtered.length);
  var rows = '';
  for (var i = start; i < end; i++) {
    var d = filtered[i];
    rows += '<tr onclick="showDetail(' + i + ')" style="cursor:pointer">' +
      '<td>' + (i + 1) + '</td>' +
      '<td><span style="color:var(--day);font-weight:600;font-size:12px">' + d.r + '</span></td>' +
      '<td class="org-name">' + d.o + '</td>' +
      '<td style="font-size:12px"><div style="color:var(--t2)">' + (d.p||'') + '</div><div>' + (d.e ? '<a href="mailto:' + d.e + '">' + d.e + '</a>' : '') + '</div></td>' +
      '<td>' + linkCell(d.w, d.wc) + '</td>' +
      '<td>' + linkCell(d.ig, d.igc) + '</td>' +
      '<td>' + linkCell(d.fb, d.fbc) + '</td>' +
      '<td>' + linkCell(d.li, d.lic) + '</td>' +
      '<td class="notes-cell"><div class="notes-expand" onclick="event.stopPropagation();this.classList.toggle('open')">' + (d.es||'—') + '</div></td>' +
      '<td>' + countryPills(d.cc) + '</td>' +
      '<td class="notes-cell"><div class="notes-expand" onclick="event.stopPropagation();this.classList.toggle('open')">' + (d.ci||'—') + '</div></td>' +
      '<td>' + countryPills(d.uc, 'unconfirmed') + '</td>' +
      '</tr>';
  }
  document.getElementById("tableBody").innerHTML = rows;
}

function renderPagination() {
  var totalPages = Math.ceil(filtered.length / PER_PAGE);
  if (totalPages <= 1) { document.getElementById("pagination").innerHTML = ''; return; }
  var html = '<button class="page-btn" onclick="goPage(1)" ' + (currentPage===1?'disabled':'') + '>&laquo;</button>';
  html += '<button class="page-btn" onclick="goPage(' + (currentPage-1) + ')" ' + (currentPage===1?'disabled':'') + '>&lsaquo;</button>';
  var start = Math.max(1, currentPage - 3);
  var end = Math.min(totalPages, start + 6);
  for (var p = start; p <= end; p++) {
    html += '<button class="page-btn ' + (p===currentPage?'active':'') + '" onclick="goPage(' + p + ')">' + p + '</button>';
  }
  html += '<button class="page-btn" onclick="goPage(' + (currentPage+1) + ')" ' + (currentPage===totalPages?'disabled':'') + '>&rsaquo;</button>';
  html += '<button class="page-btn" onclick="goPage(' + totalPages + ')" ' + (currentPage===totalPages?'disabled':'') + '>&raquo;</button>';
  html += '<span class="page-info">Page ' + currentPage + ' of ' + totalPages + '</span>';
  document.getElementById("pagination").innerHTML = html;
}

function goPage(p) { currentPage = p; renderTable(); renderPagination(); window.scrollTo(0, 200); }

function sortBy(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
  applyFilters();
}

function resetFilters() {
  document.getElementById("fSearch").value = '';
  document.getElementById("fRegion").value = '';
  document.getElementById("fCountry").value = '';
  document.getElementById("fWebsite").value = '';
  document.getElementById("fIG").value = '';
  document.getElementById("fFB").value = '';
  document.getElementById("fLI").value = '';
  document.getElementById("fConf").value = '';
  applyFilters();
}

function showDetail(idx) {
  var d = filtered[idx];
  document.getElementById("modalTitle").textContent = d.o;
  var fields = [
    ['Region', d.r],
    ['Phone', d.p],
    ['Email', d.e ? '<a href="mailto:' + d.e + '">' + d.e + '</a>' : '—'],
    ['Website', d.w ? '<a href="' + d.w + '" target="_blank">' + d.w + '</a> ' + confBadge(d.wc) : '—'],
    
    ['Instagram', d.ig ? '<a href="' + d.ig + '" target="_blank">' + d.ig + '</a> ' + confBadge(d.igc) : '—'],
    
    ['Facebook', d.fb ? '<a href="' + d.fb + '" target="_blank">' + d.fb + '</a> ' + confBadge(d.fbc) : '—'],
    
    ['LinkedIn', d.li ? '<a href="' + d.li + '" target="_blank">' + d.li + '</a> ' + confBadge(d.lic) : '—'],
    
    ['Extra Socials', d.es || '—'],
    ['Confirmed Countries', countryPills(d.cc) || '—'],
    
    ['Confirmed Cities', d.ci || '—'],
    ['Unconfirmed Countries', countryPills(d.uc, 'unconfirmed') || '—'],
    
    
  ];
  var html = '';
  fields.forEach(function(f) {
    html += '<div class="modal-field"><div class="modal-field-label">' + f[0] + '</div><div class="modal-field-value">' + f[1] + '</div></div>';
  });
  document.getElementById("modalBody").innerHTML = html;
  document.getElementById("modal").classList.add("open");
}

function closeModal() { document.getElementById("modal").classList.remove("open"); }

function exportCSV() {
  var headers = ["Region","Organiser","Phone","Email","Website","W.Conf","Instagram","IG.Conf","Facebook","FB.Conf","LinkedIn","LI.Conf","Extra Socials","Confirmed Countries","Confirmed Cities","Unconfirmed Countries"];
  var csv = headers.join(",") + "\n";
  filtered.forEach(function(d) {
    csv += [d.r, '"'+d.o+'"', d.p, d.e, d.w, d.wc, d.ig, d.igc, d.fb, d.fbc, d.li, d.lic, '"'+(d.es||'')+'"', '"'+(d.cc||'')+'"', '"'+(d.ci||'')+'"', '"'+(d.uc||'')+'"'].join(",") + "\n";
  });
  var blob = new Blob([csv], {type: 'text/csv'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'org_research_export.csv';
  a.click();
}
